name: EAS Build

on:
  workflow_dispatch:
    inputs:
      platform:
        description: Platform to build
        required: true
        default: android
        type: choice
        options:
          - android
          - ios
          - all
      profile:
        description: Build profile
        required: true
        default: preview
        type: choice
        options:
          - development
          - preview
          - production

defaults:
  run:
    working-directory: packages/voice-telephony/web

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/voice-telephony/web/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Expo doctor
        run: npx expo-doctor || true

  build-android:
    name: Build Android
    needs: validate
    runs-on: ubuntu-latest
    if: ${{ inputs.platform == 'android' || inputs.platform == 'all' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/voice-telephony/web/package-lock.json

      - name: Install dependencies
        run: npm install

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android
        run: eas build --platform android --profile ${{ inputs.profile }} --non-interactive

  build-ios:
    name: Build iOS
    needs: validate
    runs-on: macos-latest
    if: ${{ inputs.platform == 'ios' || inputs.platform == 'all' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/voice-telephony/web/package-lock.json

      - name: Install dependencies
        run: npm install

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build iOS
        run: eas build --platform ios --profile ${{ inputs.profile }} --non-interactive

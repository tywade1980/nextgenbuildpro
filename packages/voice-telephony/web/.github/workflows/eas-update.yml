name: EAS Update (OTA)

on:
  push:
    branches:
      - main
      - master
      - claude/consolidate-repos-JkOQb
    paths:
      - packages/voice-telephony/web/**

defaults:
  run:
    working-directory: packages/voice-telephony/web

jobs:
  update:
    name: Push OTA Update
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/voice-telephony/web/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: TypeScript check
        run: npx tsc --noEmit

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Push OTA update
        run: eas update --auto --non-interactive
